<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Fil du Labyrinthe — Références Historiques</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --cream: #ffffff;
    --parchment: #f7f7f7;
    --ink: #1a1a1a;
    --ink-light: #444444;
    --rust: #d0021b;
    --gold: #d0021b;
    --gold-light: #d0021b;
    --muted: #888888;
    --border: #e0e0e0;
    --book1: #c4781e;
    --book2: #2a5aa0;
    --book3: #2a7a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 2.5rem 4rem 2rem;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }

  header::after {
    display: none;
  }

  h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 0;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  h1 em {
    font-style: normal;
    color: var(--ink-light);
  }

  .header-image {
    margin: 1.5rem 0 0;
    overflow: hidden;
    max-height: 340px;
  }

  .header-image img {
    width: 100%;
    height: 340px;
    object-fit: cover;
    object-position: center 70%;
    display: block;
    filter: grayscale(100%);
  }

  .book-legend {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Book dropdown container */
  .book-dropdown {
    position: relative;
  }

  .book-dropdown-trigger {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--muted);
    cursor: pointer;
    transition: opacity 0.2s;
    user-select: none;
    text-transform: uppercase;
  }

  .book-dropdown-trigger:hover { opacity: 0.7; }
  .book-dropdown.inactive .book-dropdown-trigger { opacity: 0.3; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dropdown-arrow {
    font-size: 1.05rem;
    margin-left: 0.15rem;
    transition: transform 0.2s;
    opacity: 0.5;
  }

  .book-dropdown.open .dropdown-arrow {
    transform: rotate(180deg);
  }

  /* Dropdown menu */
  .book-dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 0.5rem);
    left: 0;
    min-width: 200px;
    background: #ffffff;
    border: 1px solid var(--border);
    padding: 0.5rem 0.35rem;
    z-index: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .book-dropdown.open .book-dropdown-menu {
    display: block;
  }

  /* Chapter items inside dropdown */
  .chapter-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 1.0rem;
    color: var(--ink-light);
    padding: 0.35rem 0.6rem;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    text-transform: uppercase;
  }

  .chapter-item:hover {
    background: rgba(0,0,0,0.04);
  }

  .chapter-check {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: var(--cream);
    transition: all 0.15s;
  }

  .chapter-item.active .chapter-check {
    border-color: var(--rust);
    background: var(--rust);
  }

  .chapter-item.inactive .chapter-check {
    opacity: 0.4;
  }

  .chapter-count {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 0.95rem;
    color: var(--muted);
    margin-left: auto;
    padding-left: 1rem;
  }

  /* Active filter pills */
  .active-filters {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    width: 100%;
    padding: 1.5rem 0 0.75rem;
  }

  .active-filters:empty {
    display: none;
  }

  .filter-pill {
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--ink-light);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .filter-pill:hover {
    border-color: var(--rust);
    color: var(--rust);
  }

  .filter-pill .pill-x {
    font-style: normal;
    font-size: 0.95rem;
    color: var(--rust);
    opacity: 0.6;
    transition: opacity 0.15s;
  }

  .filter-pill:hover .pill-x {
    opacity: 1;
  }

  .filter-pill .pill-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Search box */
  .search-box {
    position: relative;
    display: flex;
    align-items: center;
    flex: 1;
  }

  .search-icon {
    position: absolute;
    left: 0.7rem;
    font-size: 1.1rem;
    color: var(--rust);
    pointer-events: none;
  }

  .search-box input {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 1.0rem;
    color: var(--ink);
    background: var(--cream);
    border: 1px solid var(--rust);
    padding: 0.4rem 2rem 0.4rem 2.2rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
    text-transform: uppercase;
    border-radius: 6px;
  }

  .search-box input::placeholder {
    color: var(--rust);
    opacity: 0.4;
  }

  .search-box input:focus {
    border-color: var(--rust);
  }

  .search-clear {
    position: absolute;
    right: 0.6rem;
    font-size: 1.1rem;
    color: var(--rust);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    padding: 0.2rem;
  }

  .search-clear.visible {
    opacity: 0.5;
    pointer-events: auto;
  }

  .search-clear:hover {
    opacity: 1;
  }

  .sort-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.45rem 1.4rem;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    border-radius: 6px;
  }

  .sort-btn::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .sort-btn.active::before {
    background: var(--rust);
  }

  .sort-btn:first-child {
    /* no special border handling */
  }

  .sort-btn.active {
    color: var(--ink-light);
    background: var(--parchment);
    border-color: var(--ink-light);
    position: relative;
    z-index: 1;
  }

  .sort-btn:hover:not(.active) {
    color: var(--ink-light);
  }

  /* Density strip */
  .density-strip {
    position: relative;
    z-index: 600;
    margin: 4rem 0 2.5rem;
    padding: 0 3.5rem;
    height: auto;
    user-select: none;
  }

  /* Period label strip above the dot line */
  .period-strip {
    display: flex;
    margin-bottom: 0.5rem;
  }

  .period-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.45rem 0;
    cursor: pointer;
    border-right: 1px solid rgba(120,100,80,0.15);
    transition: background 0.2s, color 0.2s;
  }
  .period-zone:last-child { border-right: none; }
  .period-zone:first-child { border-radius: 3px 0 0 3px; }
  .period-zone:last-child { border-radius: 0 3px 3px 0; }

  .period-zone:hover .period-label {
    color: var(--rust);
  }

  .period-zone.active {
    background: var(--rust);
  }

  .period-zone.active .period-label {
    color: #ffffff;
  }

  .period-zone.pending {
    background: rgba(208,2,27,0.08);
  }

  .period-zone.pending .period-label {
    color: var(--rust);
  }

  .period-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--ink-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    padding: 0 0.5rem;
    line-height: 1.2;
    text-align: center;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  /* Dot line below period strip */
  .density-dots {
    position: relative;
    height: 4.5rem;
    margin: 0;
  }

  .density-dots::before {
    content: '';
    position: absolute;
    top: 30%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--ink);
    opacity: 0.2;
    transform: translateY(-50%);
  }

  .density-dots::after {
    content: '';
    position: absolute;
    top: 30%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--ink);
    opacity: 0.05;
    transform: translateY(-50%);
  }

  /* Single dot */
  .density-dot {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    top: 30%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 2;
  }

  .density-dot.inactive {
    opacity: 0.15;
  }


  /* Cluster bubble */
  .density-cluster {
    position: absolute;
    top: 30%;
    transform: translate(-50%, -50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    border: 2px solid var(--cream);
  }

  .density-cluster.inactive {
    opacity: 0.15;
  }

  .cluster-count {
    font-family: 'Inter', sans-serif;
    font-size: 1.05rem;
    color: var(--cream);
    line-height: 1;
    font-weight: 600;
  }

  /* Axis labels */
  .density-label {
    position: absolute;
    top: calc(30% + 1.5rem);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.7;
  }

  .density-label-start {
    left: 0;
  }

  .density-label-end {
    right: 0;
  }

  /* Landmark */
  .density-landmark {
    position: absolute;
    top: calc(30% + 1.5rem);
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--rust);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.8;
  }

  .density-landmark::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 0.5rem;
    background: var(--rust);
    opacity: 0.4;
  }

  .landmark-short {
    display: none;
  }

  /* Filter row below strip */
  .density-filter-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.75rem;
    min-height: 1.2rem;
  }

  .density-filter-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--ink-light);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .density-filter-confirm {
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--rust);
    background: none;
    border: 1px solid var(--rust);
    padding: 0.4rem 1.2rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .density-filter-confirm:hover {
    background: var(--rust);
    color: #ffffff;
  }


  /* Timeline container */
  .timeline-wrapper {
    padding: 3rem 4rem 6rem;
    position: relative;
  }

  /* Central spine */
  .timeline-spine {
    position: absolute;
    left: calc(4rem + 100px);
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--border) 50%, var(--border) 95%, transparent);
  }

  .timeline-spine::after {
    display: none;
  }

  /* Year clusters */
  .year-cluster {
    position: relative;
    margin-bottom: 0;
  }

  /* Individual event */
  .event {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 0 2rem;
    position: relative;
    padding: 0;
    max-width: 1050px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .event.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .event.hidden {
    display: none;
  }

  /* Date column */
  .event-date {
    text-align: right;
    padding-top: 1.75rem;
    padding-right: 1.25rem;
    position: relative;
  }

  .event-year {
    font-family: 'Inter', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
  }

  .event-era {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--muted);
    display: block;
    margin-top: 0.15rem;
    text-transform: uppercase;
  }

  .event-month {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-top: 0.25rem;
  }

  /* Node on the spine */
  .event-node {
    position: absolute;
    right: -5px;
    top: 2rem;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--cream);
    z-index: 2;
    transition: transform 0.2s, border-color 0.2s;
  }

  .event:hover .event-node {
    transform: scale(1.5);
  }

  /* Content card */
  .event-card {
    background: var(--cream);
    border-top: 1px solid var(--border);
    padding: 1.75rem 0 1.75rem 1.5rem;
    position: relative;
    transition: box-shadow 0.2s, transform 0.2s;
    max-width: 850px;
  }

  .event-card::before {
    display: none;
  }

  .event-card::after {
    display: none;
  }

  .event:hover .event-card {
    box-shadow: none;
    transform: none;
  }

  .event-card.highlight {
    padding-right: 1.5rem;
  }

  .event-card.highlight::after {
    display: block;
    content: '';
    position: absolute;
    right: 0;
    top: 3.5rem;
    bottom: 0.75rem;
    width: 4px;
    border-radius: 3px;
    background: var(--rust);
    transition: opacity 0.3s;
    opacity: 0.3;
  }

  .event-card.highlight-out {
    padding-right: 1.5rem;
  }

  .event-card.highlight-out::after {
    display: block;
    content: '';
    position: absolute;
    right: 0;
    top: 3.5rem;
    bottom: 0.75rem;
    width: 4px;
    border-radius: 3px;
    background: var(--rust);
    opacity: 0;
    transition: opacity 0.6s;
  }

  /* Book tag */
  .book-tag {
    position: absolute;
    top: 1.75rem;
    right: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 0.2rem 0.6rem;
    color: var(--cream);
    text-transform: uppercase;
  }

  .event-title {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    font-style: normal;
    color: var(--ink);
    margin-bottom: 0.6rem;
    padding-right: 7rem;
    line-height: 1.4;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .event-description {
    font-size: 1.1rem;
    line-height: 1.7;
    color: var(--ink-light);
    font-weight: 400;
  }

  .event-description em {
    font-style: italic;
  }

  .event-description strong {
    font-style: normal;
    font-weight: 500;
    color: var(--ink);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 1.05rem;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Count */
  .event-count {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  /* Divider between different years */
  .year-divider {
    grid-column: 1 / -1;
    height: 1px;
    background: var(--border);
    opacity: 0.4;
    margin: 0;
  }

  @media (max-width: 700px) {
    /* Header */
    header { padding: 1.25rem 1rem 1rem; }
    header::after { left: 1rem; right: 1rem; }
    h1 { font-size: 1.05rem; line-height: 1.5; }
    .header-image { max-height: 180px; margin: 0.75rem 0 0; }
    .header-image img { height: 180px; }

    /* Legend & meta */
    .book-legend { gap: 0.5rem; }
    .book-dropdown-trigger { font-size: 0.85rem; gap: 0.35rem; }
    .legend-dot { width: 7px; height: 7px; }
    .dropdown-arrow { font-size: 0.6rem; }
    .book-dropdown-menu { min-width: 170px; padding: 0.4rem 0.25rem; }
    .chapter-item { font-size: 0.85rem; padding: 0.3rem 0.5rem; gap: 0.4rem; }
    .chapter-check { width: 11px; height: 11px; font-size: 0.55rem; }
    .chapter-count { font-size: 0.75rem; }

    /* Chapter chips (legacy cleanup) */
    .chapter-filter { display: none; }

    /* Controls bar */
    .controls-bar { flex-wrap: wrap; gap: 0.5rem; padding: 0.5rem 0; }
    .search-box { width: 100%; flex: none; order: 2; }
    .search-box input { width: 100%; font-size: 0.85rem; padding: 0.35rem 1.8rem 0.35rem 1.8rem; }
    .search-box input:focus { width: 100%; }
    .search-icon { font-size: 0.95rem; left: 0.5rem; }
    .search-clear { font-size: 0.85rem; right: 0.5rem; }
    .controls-trigger { border-radius: 6px; font-size: 0.8rem; padding: 0.35rem 1rem; }
    .controls-menu { padding: 0.5rem; }
    #filtres-menu { min-width: 240px; }
    .active-filters { gap: 0.4rem; padding: 0.5rem 0 0; }
    .filter-pill { border-radius: 6px; font-size: 0.8rem; padding: 0.2rem 0.6rem; gap: 0.3rem; }
    .filter-pill .pill-dot { width: 5px; height: 5px; }
    .filter-pill .pill-x { font-size: 0.6rem; }

    /* Density strip / period minimap */
    .density-strip { margin: 1rem 0 0.75rem; padding: 0 1rem; }
    .period-strip { display: none; }
    .density-dots { height: 2.5rem; }
    .density-dot { width: 5px; height: 5px; }
    .density-label { font-size: 0.75rem; top: calc(30% + 1rem); }
    .density-landmark { font-size: 0.75rem; top: calc(30% + 1rem); }
    .landmark-full { display: none; }
    .landmark-short { display: block; }
    .density-landmark::before { height: 0.35rem; }
    .density-cluster { width: 18px; height: 18px; border-width: 1.5px; }
    .cluster-count { font-size: 0.7rem; }
    .density-filter-label { font-size: 0.85rem; }
    .density-filter-confirm { font-size: 0.8rem; padding: 0.3rem 0.9rem; }
    .density-filter-row { margin-top: 0.5rem; }

    /* Timeline wrapper */
    .timeline-wrapper { padding: 1.5rem 1rem 3rem; }

    /* Spine */
    .timeline-spine { left: calc(1rem + 55px); }

    /* Events */
    .event {
      grid-template-columns: 55px 1fr;
      gap: 0 0.75rem;
      padding: 1.25rem 0;
      max-width: none;
    }

    /* Date column */
    .event-date { padding-right: 0.5rem; padding-top: 0.75rem; }
    .event-year { font-size: 1.0rem; }
    .event-era { font-size: 0.5rem; margin-top: 0.1rem; }

    description: "Yourcenar évoque un <em>« philosophe du pays de Liège qui pensa à l'antique un siècle plus tard »</em> — <span class=\"person-link\" data-pid=\"david_dinant\">David de Dinant</span> (~1160–ap. 1215), né à Dinant dans la principauté de Liège. Inspiré d'Anaximandre et de Sénèque, il enseigna un panthéisme radical : Dieu, l'intellect et la matière sont une seule et même substance. <em>« Quis est Deus? Mens Universi. »</em> Ses Quaternuli furent condamnés et brûlés par le synode de Paris en 1210 (Yourcenar écrit qu'il fut lui-même brûlé, mais il semble avoir fui). <span class=\"person-link\" data-pid=\"thomas_aquin\">Thomas d'Aquin</span> et <span class=\"person-link\" data-pid=\"albert_grand\">Albert le Grand</span> le réfutèrent ; <span class=\"person-link\" data-pid=\"bruno\">Giordano Bruno</span>, quatre siècles plus tard, revendiqua explicitement sa thèse.",

    title: "« Les Ducs de Bourgogne »",
    description: "La maison de Bourgogne descend d'une branche cadette des Valois : en 1363, le roi de France Jean II le Bon donne le duché de Bourgogne à son fils <span class=\"person-link\" data-pid=\"philippe_hardi\">Philippe le Hardi</span>. Ses successeurs — <span class=\"person-link\" data-pid=\"jean_sans_peur\">Jean sans Peur</span>, <span class=\"person-link\" data-pid=\"philippe_bon\">Philippe le Bon</span>, <span class=\"person-link\" data-pid=\"charles_temeraire\">Charles le Téméraire</span> — construisent par mariages, héritages et conquêtes un vaste ensemble territorial (Flandre, Brabant, Artois, Hollande, Franche-Comté) rival du royaume de France. Leur cour, avec l'Ordre de la Toison d'or et son cérémonial fastueux, était considérée comme la plus brillante d'Europe au XV<sup>e</sup> siècle. En 1477, à la mort de <span class=\"person-link\" data-pid=\"charles_temeraire\">Charles le Téméraire</span> devant Nancy, sa fille unique <span class=\"person-link\" data-pid=\"marie_bourgogne\">Marie de Bourgogne</span> épouse <span class=\"person-link\" data-pid=\"maximilien\">Maximilien de Habsbourg</span> : les territoires bourguignons passent aux Habsbourg, et avec eux cette culture de cour qui deviendra le modèle du pouvoir habsbourgeois en Espagne et en Autriche — une nostalgie de grandeur féodale déjà crépusculaire.",

ata-pid=\"augustin_robespierre\">Augustin Robespierre</span> (1763–1794), frère cadet de Maximilien et conventionnel, se jette par une fenêtre. Le lendemain, le 10 thermidor, <span class=\"person-link\" data-pid=\"robespierre\">Robespierre</span>, <span class=\"person-link\" data-pid=\"saint_just\">Saint-Just</span>, <span class=\"person-link\" data-pid=\"couthon\">Couthon</span> et dix-neuf autres sont guillotinés sans procès. La Terreur prend fin ; la Convention thermidorienne qui lui succède démantèle le gouvernement révolutionnaire.",

    description: "En juin 1692, <span class=\"person-link\" data-pid=\"louis_xiv\">Louis XIV</span> assiège et prend la ville de Namur, place forte des Pays-Bas espagnols, dans le cadre de la guerre de la Ligue d'Augsbourg (1688–1697). Namur appartenait alors à <span class=\"person-link\" data-pid=\"charles_ii\">Charles II</span> d'Espagne (1661–1700), dit « l'Ensorcelé », dernier roi Habsbourg d'Espagne — souverain aussi des Pays-Bas, de Naples, de Sicile, du Milanais et des Indes. Né gravement affaibli par des générations de consanguinité dynastique, sans héritier, il régna sous la tutelle successive de sa mère, de son demi-frère et de ses ministres. <span class=\"person-link\" data-pid=\"louis_xiv\">Louis XIV</span>, son cousin germain et beau-frère (ayant épousé sa demi-sœur <span class=\"person-link\" data-pid=\"marie_therese_austria\">Marie-Thérèse</span>), revendiquait des provinces des Pays-Bas espagnols au nom d'une dot jamais versée. Les guerres de <span class=\"person-link\" data-pid=\"louis_xiv\">Louis XIV</span> contre l'Espagne — de Dévolution (1667–68), de Hollande (1672–78), de la Ligue d'Augsbourg (1688–97) — arrachèrent à <span class=\"person-link\" data-pid=\"charles_ii\">Charles II</span> la Franche-Comté, l'Artois, une partie de la Flandre et le Luxembourg. Le siège de Namur, dirigé par <span class=\"person-link\" data-pid=\"vauban\">Vauban</span>, dura un mois et fut considéré comme un triomphe militaire — <span class=\"person-link\" data-pid=\"boileau\">Boileau</span> le célébra dans une ode. <span class=\"person-link\" data-pid=\"louis_xiv\">Louis XIV</span> y assista en grande pompe. La ville fut reprise par <span class=\"person-link\" data-pid=\"guillaume_iii\">Guillaume III d'Orange</span> en 1695. À la mort de <span class=\"person-link\" data-pid=\"charles_ii\">Charles II</span> en 1700, son testament désigna le petit-fils de <span class=\"person-link\" data-pid=\"louis_xiv\">Louis XIV</span> comme héritier, déclenchant la guerre de Succession d'Espagne (1701–1714) qui transféra les Pays-Bas aux Habsbourg d'Autriche.",

// ─── BOOK COLOURS ────────────────────────────────────────────────────────────
const bookColors = {
  1: 'var(--book1)',
  2: 'var(--book2)',
  3: 'var(--book3)'
};

const bookNames = {
  1: 'I',
  2: 'II',
  3: 'III'
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeChapters = new Set(); // empty = show all (unfiltered)
let openDropdown = null;
let sortMode = 'chrono'; // 'chrono' or 'text'

// When no chapters selected, everything is visible
function isChapterVisible(chapter) {
  return activeChapters.size === 0 || activeChapters.has(chapter);
}

const fullBookNames = {
  1: 'I. Souvenirs Pieux',
  2: 'II. Archives du Nord',
  3: "III. Quoi? L'Éternité"
};

// ─── BUILD LEGEND WITH DROPDOWNS ────────────────────────────────────────────
function buildLegend() {
  const legend = document.getElementById('legend');
  const chaptersPerBook = {};
  const sorted = [...events].sort((a, b) => a.year - b.year);

  // Gather chapters per book in chronological order
  for (const e of sorted) {
    if (!chaptersPerBook[e.book]) chaptersPerBook[e.book] = [];
    if (!chaptersPerBook[e.book].find(c => c.name === e.chapter)) {
      const count = events.filter(ev => ev.book === e.book && ev.chapter === e.chapter).length;
      chaptersPerBook[e.book].push({ name: e.chapter, count });
    }
  }

  legend.innerHTML = [1, 2, 3].map(book => {
    const chapters = chaptersPerBook[book] || [];
    const hasChapters = chapters.length > 0;
    return `
      <div class="book-dropdown${hasChapters ? '' : ' inactive'}" data-book="${book}" id="book-dropdown-${book}">
        <div class="book-dropdown-trigger" onclick="${hasChapters ? `toggleDropdown(${book})` : ''}">
          <div class="legend-dot" style="background:${bookColors[book]}"></div>
          ${fullBookNames[book]}
          ${hasChapters ? '<span class="dropdown-arrow">▾</span>' : ''}
        </div>
        ${hasChapters ? `<div class="book-dropdown-menu">${
          chapters.map(c =>
            `<button class="chapter-item ${activeChapters.has(c.name) ? 'active' : 'inactive'}"
              data-chapter="${c.name}" data-book="${book}"
              onclick="event.stopPropagation(); toggleChapter('${c.name.replace(/'/g, "\\'")}')">
              <span class="chapter-check">✓</span>
              « ${c.name} »
              <span class="chapter-count">${c.count}</span>
            </button>`
          ).join('')
        }</div>` : ''}
      </div>
    `;
  }).join('');
}

function toggleDropdown(book) {
  if (openDropdown === book) {
    closeDropdowns();
  } else {
    closeDropdowns();
    openDropdown = book;
    document.getElementById(`book-dropdown-${book}`).classList.add('open');
  }
}

function closeDropdowns() {
  openDropdown = null;
  document.querySelectorAll('.book-dropdown').forEach(el => el.classList.remove('open'));
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.book-dropdown')) closeDropdowns();
  if (!e.target.closest('.controls-dropdown')) closeAllControlsMenus();
});

function toggleControlsMenu(id) {
  const dropdown = document.getElementById(`${id}-dropdown`);
  const wasOpen = dropdown.classList.contains('open');
  closeAllControlsMenus();
  if (!wasOpen) {
    dropdown.classList.add('open');
  }
}

function closeAllControlsMenus() {
  document.querySelectorAll('.controls-dropdown').forEach(el => el.classList.remove('open'));
}

function toggleChapter(name) {
  if (activeChapters.has(name)) {
    activeChapters.delete(name);
  } else {
    activeChapters.add(name);
  }
  updateChapterItems();
  updateBookStates();
  render();
}

function updateChapterItems() {
  document.querySelectorAll('.chapter-item').forEach(el => {
    const ch = el.dataset.chapter;
    el.classList.toggle('active', activeChapters.has(ch));
    el.classList.toggle('inactive', !activeChapters.has(ch));
  });
}

function updateBookStates() {
  [1, 2, 3].forEach(book => {
    const bookChapters = events.filter(e => e.book === book).map(e => e.chapter);
    const anyActive = activeChapters.size === 0 || bookChapters.some(ch => activeChapters.has(ch));
    const dropdown = document.getElementById(`book-dropdown-${book}`);
    if (dropdown && bookChapters.length > 0) {
      dropdown.classList.toggle('inactive', !anyActive);
    }
  });
}

// ─── SORT ────────────────────────────────────────────────────────────────────
function setSortMode(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.sort === mode);
  });
  render();
}

// ─── DENSITY STRIP (PERIOD LABELS + DOT LINE) ──────────────────────────────
let activeYearRange = null; // {from, to, label} or null for all

const periods = [
  { from: -100000, to: 0,    label: "Antiquité",             fromPct: 0,  toPct: 8  },
  { from: 0,       to: 1000, label: "Haut Moyen Âge",        fromPct: 8,  toPct: 16 },
  { from: 1000,    to: 1500, label: "Moyen Âge",             fromPct: 16, toPct: 26 },
  { from: 1500,    to: 1700, label: "XVIᵉ–XVIIᵉ",           fromPct: 26, toPct: 36 },
  { from: 1700,    to: 1789, label: "XVIIIᵉ",               fromPct: 36, toPct: 48 },
  { from: 1789,    to: 1815, label: "Révolution &amp; Empire", fromPct: 48, toPct: 58 },
  { from: 1815,    to: 1850, label: "1815–1850",             fromPct: 58, toPct: 68 },
  { from: 1850,    to: 1875, label: "Second Empire",         fromPct: 68, toPct: 84 },
  { from: 1875,    to: 2026, label: "1875–1903",             fromPct: 84, toPct: 100 }
];

function yearToPosition(year) {
  if (year <= periods[0].from) return 0;
  if (year >= periods[periods.length - 1].to) return 100;
  for (const p of periods) {
    if (year >= p.from && year <= p.to) {
      const ratio = (year - p.from) / (p.to - p.from);
      return p.fromPct + ratio * (p.toPct - p.fromPct);
    }
  }
  return 50;
}

function renderDensityStrip() {
  // ── Period label strip ──
  const strip = document.getElementById('period-strip');
  strip.innerHTML = periods.map((p, i) => {
    const widthPct = p.toPct - p.fromPct;
    const isActive = activeYearRange && activeYearRange.from === p.from && activeYearRange.to === p.to;
    const isPending = pendingPeriod === i;
    return `<div class="period-zone${isActive ? ' active' : ''}${isPending ? ' pending' : ''}"
      style="flex:${widthPct} 0 0%"
      onclick="filterByPeriod(${i})">
      <span class="period-label">${p.label}</span>
    </div>`;
  }).join('');

  // ── Dot line ──
  const container = document.getElementById('density-dots');
  const positioned = events.map((e, i) => ({
    event: e, index: i,
    pct: yearToPosition(e.year),
    active: isChapterVisible(e.chapter)
  }));

  // Cluster nearby dots
  const clusterThreshold = 1.2;
  const clusters = [];
  const used = new Set();
  const byPos = [...positioned].sort((a, b) => a.pct - b.pct);

  for (let i = 0; i < byPos.length; i++) {
    if (used.has(byPos[i].index)) continue;
    const cluster = [byPos[i]];
    used.add(byPos[i].index);
    for (let j = i + 1; j < byPos.length; j++) {
      if (used.has(byPos[j].index)) continue;
      if (Math.abs(byPos[j].pct - byPos[i].pct) <= clusterThreshold) {
        cluster.push(byPos[j]);
        used.add(byPos[j].index);
      }
    }
    clusters.push(cluster);
  }

  container.innerHTML = clusters.map((cluster, ci) => {
    const avgPct = cluster.reduce((s, c) => s + c.pct, 0) / cluster.length;
    const anyActive = cluster.some(c => c.active);

    if (cluster.length === 1) {
      const c = cluster[0];
      return `<div class="density-dot ${c.active ? '' : 'inactive'}"
        style="left:${c.pct}%; background:${bookColors[c.event.book]}">
      </div>`;
    } else {
      const bookCounts = {};
      cluster.forEach(c => { bookCounts[c.event.book] = (bookCounts[c.event.book] || 0) + 1; });
      const dominantBook = Object.entries(bookCounts).sort((a, b) => b[1] - a[1])[0][0];
      const color = bookColors[dominantBook];

      return `<div class="density-cluster ${anyActive ? '' : 'inactive'}"
        style="left:${avgPct}%; background:${color}">
        <span class="cluster-count">${cluster.length}</span>
      </div>`;
    }
  }).join('');

  // Axis labels
  container.innerHTML += `<div class="density-label density-label-start">Pléistocène</div>`;
  container.innerHTML += `<div class="density-label density-label-end">2026</div>`;

  // Filter row
  const filterRow = document.getElementById('density-filter-row');
  if (activeYearRange) {
    filterRow.innerHTML = `
      <button class="density-filter-label" onclick="clearYearFilter()" style="cursor:pointer; border:none; background:none;">
        ${activeYearRange.label} — ${activeYearRange.count} référence${activeYearRange.count !== 1 ? 's' : ''} <span style="opacity:0.5; margin-left:0.3rem;">✕</span>
      </button>
    `;
  } else if (pendingPeriod !== null) {
    const p = periods[pendingPeriod];
    const tmp = document.createElement('span');
    tmp.innerHTML = p.label;
    const label = tmp.textContent;
    const count = events.filter(e => e.year >= p.from && e.year < p.to && isChapterVisible(e.chapter)).length;
    filterRow.innerHTML = `
      <button class="density-filter-confirm" onclick="confirmPeriodFilter(${pendingPeriod})">
        Filtrer par période — ${label} — ${count} référence${count !== 1 ? 's' : ''}
      </button>
    `;
  } else {
    filterRow.innerHTML = '';
  }
}

let pendingPeriod = null; // index of period pending confirmation

function filterByPeriod(index) {
  const p = periods[index];
  // If clicking the already-active filter, clear it
  if (activeYearRange && activeYearRange.from === p.from && activeYearRange.to === p.to) {
    clearYearFilter();
    return;
  }
  // If clicking the already-pending period, cancel it
  if (pendingPeriod === index) {
    pendingPeriod = null;
    renderDensityStrip();
    return;
  }
  // If there's an active filter, clear it first
  if (activeYearRange) {
    activeYearRange = null;
  }
  // Set pending — just show the preview, don't filter yet
  pendingPeriod = index;
  renderDensityStrip();
}

function confirmPeriodFilter(index) {
  const p = periods[index];
  const count = events.filter(e => e.year >= p.from && e.year < p.to && isChapterVisible(e.chapter)).length;
  const tmp = document.createElement('span');
  tmp.innerHTML = p.label;
  activeYearRange = { from: p.from, to: p.to, label: tmp.textContent, count };
  pendingPeriod = null;
  render();
  document.getElementById('timeline').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearYearFilter() {
  activeYearRange = null;
  pendingPeriod = null;
  render();
}

function matchesYearRange(e) {
  if (!activeYearRange) return true;
  return e.year >= activeYearRange.from && e.year < activeYearRange.to;
}

function clearHighlight() {
  document.querySelectorAll('.event-card.highlight').forEach(el => {
    el.classList.remove('highlight');
    el.classList.add('highlight-out');
    setTimeout(() => el.classList.remove('highlight-out'), 600);
  });
}

function highlightCard(card) {
  clearHighlight();
  card.classList.remove('highlight-out');
  card.classList.add('highlight');
}

// Clear highlight on click anywhere except the highlighted card
document.addEventListener('click', (e) => {
  if (!e.target.closest('.event-card.highlight') && !e.target.closest('.map-custom-popup') && !e.target.closest('.leaflet-marker-icon') && !e.target.closest('.pop-entry')) {
    clearHighlight();
  }
});

function scrollToEvent(dataIndex) {
  const e = events[dataIndex];
  const cards = document.querySelectorAll('.event');
  for (const card of cards) {
    if (card.querySelector('.event-title')?.textContent === e.title) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      highlightCard(card.querySelector('.event-card'));
      break;
    }
  }
}

// ─── ACTIVE FILTERS DISPLAY ─────────────────────────────────────────────────
function updateActiveFilters() {
  const container = document.getElementById('active-filters');
  const hint = document.getElementById('filter-hint');

  let html = [...activeChapters].map(ch => {
    const book = events.find(e => e.chapter === ch)?.book;
    const color = book ? bookColors[book] : 'var(--muted)';
    return `<button class="filter-pill" onclick="toggleChapter('${ch.replace(/'/g, "\\'")}')">
      <span class="pill-dot" style="background:${color}"></span>
      « ${ch} »
      <span class="pill-x">✕</span>
    </button>`;
  }).join('');

  if (activeYearRange) {
    html += `<button class="filter-pill" onclick="clearYearFilter()" style="border-color:var(--rust)">
      <span class="pill-dot" style="background:var(--rust)"></span>
      ${activeYearRange.label}
      <span class="pill-x">✕</span>
    </button>`;
  }

  container.innerHTML = html;

  // Show hint when unfiltered
  const isUnfiltered = activeChapters.size === 0 && !activeYearRange && !searchQuery;
  hint.textContent = isUnfiltered
    ? `${events.length} références — utilisez les filtres pour explorer par livre ou chapitre`
    : '';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
// ─── SEARCH ─────────────────────────────────────────────────────────────────
let searchQuery = '';

function handleSearch(value) {
  searchQuery = value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', searchQuery.length > 0);
  render();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  render();
}

function matchesSearch(e) {
  if (!searchQuery) return true;
  const haystack = `${e.title} ${e.description} ${e.year} ${e.month || ''}`.toLowerCase();
  // Match all words (AND logic)
  return searchQuery.split(/\s+/).every(word => haystack.includes(word));
}

function render() {
  const container = document.getElementById('timeline');
  const sorted = sortMode === 'chrono'
    ? [...events].sort((a, b) => a.year - b.year || a.textOrder - b.textOrder)
    : [...events].sort((a, b) => a.book - b.book || a.textOrder - b.textOrder);
  const filtered = sorted.filter(e => isChapterVisible(e.chapter) && matchesSearch(e) && matchesYearRange(e));

  if (filtered.length === 0) {
    container.innerHTML = '<p class="empty-state">Aucun événement pour la sélection en cours.</p>';
    document.getElementById('event-count').textContent = '';
    return;
  }

  container.innerHTML = filtered.map((e, i) => {
    const delay = (i % 8) * 80;
    const displayYear = e.year < 0
      ? (Math.abs(e.year) >= 10000
        ? `~${Math.round(Math.abs(e.year)/1000)}k <span class="event-era">av. J.-C.</span>`
        : `${Math.abs(e.year)} <span class="event-era">av. J.-C.</span>`)
      : e.year;
    return `
      <div class="event" style="transition-delay:${delay}ms" data-book="${e.book}">
        <div class="event-date">
          <span class="event-year">${displayYear}</span>
          ${e.month ? `<span class="event-month">${e.month}</span>` : ''}
          <div class="event-node" style="border-color:${bookColors[e.book]}; background:var(--cream)"></div>
        </div>
        <div class="event-card">
          <div class="book-tag" style="background:${bookColors[e.book]}">Livre ${bookNames[e.book]}</div>
          <div class="event-title">${e.title}</div>
          <div class="event-description">${e.description}</div>
        </div>
      </div>
    `;
  }).join('');

  // Animate in
  requestAnimationFrame(() => {
    document.querySelectorAll('.event').forEach(el => {
      setTimeout(() => el.classList.add('visible'), parseInt(el.style.transitionDelay) || 0);
    });
  });

  const total = events.length;
  const shown = filtered.length;
  const label = shown === total
    ? `${total} référence${total > 1 ? 's' : ''} — trilogie complète`
    : `${shown} référence${shown > 1 ? 's' : ''} affichée${shown > 1 ? 's' : ''} sur ${total}`;
  document.getElementById('event-count').textContent = label;
  updateActiveFilters();
  renderDensityStrip();
}

let map = null;
let mapMarkers = [];

function toggleMapFullscreen() {
  const container = document.getElementById('map-container');
  container.classList.toggle('fullscreen');
  document.body.style.overflow = container.classList.contains('fullscreen') ? 'hidden' : '';
  setTimeout(() => map.invalidateSize(), 100);
}

function closeMapFullscreen() {
  const container = document.getElementById('map-container');
  container.classList.remove('fullscreen');
  container.classList.remove('mobile-open');
  document.body.style.overflow = '';
  setTimeout(() => map.invalidateSize(), 100);
}

function toggleMobileMap() {
  const container = document.getElementById('map-container');
  if (container.classList.contains('mobile-open')) {
    closeMapFullscreen();
  } else {
    container.classList.add('mobile-open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => map.invalidateSize(), 100);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMapFullscreen();
});

function initMap() {
  map = L.map('map', {
    scrollWheelZoom: true,
    zoomControl: true,
  }).setView([50.5, 5.5], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);

  renderMapMarkers();
  setTimeout(() => map.invalidateSize(), 200);
}

function renderMapMarkers() {
  if (!map) return;

  // Clear existing markers
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];

  // Group events by location
  const locationGroups = {};

  events.forEach((e, idx) => {
    const coords = eventCoords[e.textOrder];
    if (!coords) return;

    const isFiltered = isChapterVisible(e.chapter) && matchesSearch(e);
    if (!isFiltered) return;

    const key = `${coords[0]},${coords[1]}`;
    if (!locationGroups[key]) {
      locationGroups[key] = { lat: coords[0], lng: coords[1], location: coords[2], events: [] };
    }
    locationGroups[key].events.push({ ...e, dataIndex: idx });
  });

  Object.values(locationGroups).forEach(group => {
    const primaryColor = bookColors[group.events[0].book];
    const count = group.events.length;
    const markerSize = count > 1 ? Math.min(28 + count * 2, 40) : 20;

    const icon = L.divIcon({
      className: 'custom-marker',
      html: `<div style="
        width: ${markerSize}px;
        height: ${markerSize}px;
        border-radius: 50%;
        background: ${count > 1 ? primaryColor : primaryColor};
        border: 2px solid #f5f0e8;
        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f5f0e8;
        font-family: 'Inter', sans-serif;
        font-size: ${count > 1 ? '0.85rem' : '0'};
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      ">${count > 1 ? count : ''}</div>`,
      iconSize: [markerSize, markerSize],
      iconAnchor: [markerSize / 2, markerSize / 2],
    });

    // Build popup content
    const locationLabel = `<div class="popup-location">${group.location}</div>`;

    const items = group.events.map(e => {
      const displayYear = e.year < 0
        ? (Math.abs(e.year) >= 10000 ? `~${Math.round(Math.abs(e.year)/1000)}k av. J.-C.` : `${Math.abs(e.year)} av. J.-C.`)
        : e.year;
      const color = bookColors[e.book];
      const plainTitle = e.title.replace(/<[^>]*>/g, '');
      return `<button class="popup-item" onclick="map.closePopup(); closeMapFullscreen(); scrollToEvent(${e.dataIndex})" style="border-left-color:${color}">
        <span class="popup-year">${displayYear}</span>${plainTitle}
      </button>`;
    }).join('');

    const popupContent = locationLabel + items;

    const marker = L.marker([group.lat, group.lng], { icon })
      .bindPopup(popupContent, {
        maxWidth: 240,
        autoPan: true,
        autoPanPadding: [60, 60],
        className: 'map-custom-popup',
      })
      .addTo(map);

    // Hover lift effect
    marker.on('mouseover', function() {
      const el = this.getElement();
      if (el) el.querySelector('div').style.transform = 'translateY(-3px) scale(1.15)';
    });
    marker.on('mouseout', function() {
      const el = this.getElement();
      if (el) el.querySelector('div').style.transform = '';
    });

    mapMarkers.push(marker);
  });

  // Keep initial view on Belgium — user can zoom out to find distant markers
}

// Update map when filters change
const originalRender = render;
render = function() {
  originalRender();
  if (map) {
    renderMapMarkers();
  }
};

  {id:"charles_lorraine",name:"Charles de Lorraine",dates:"1712–1780",dynasty:"habsbourg_austria",role:"Gouverneur · Pays-Bas autrichiens",bio:"Gouverneur 1744–1780. Beau-frère de Marie-Thérèse. Résidence à Mariemont. Sa maîtresse « la Pelote » recevait 40 000 livres par an.",entries:["Charles de Lorraine à Mariemont"]},
  {id:"leopold_ii_emp",name:"Léopold II",dates:"1747–1792",dynasty:"habsbourg_austria",role:"Empereur · Autriche, Bohême, Hongrie, Pays-Bas",bio:"Empereur 1790–1792. Frère cadet de Joseph II, grand-duc de Toscane pendant 25 ans. Réformateur prudent, meurt subitement deux ans après son accession au trône impérial.",entries:[]},
  {id:"franz_ii",name:"François II / Iᵉʳ",dates:"1768–1835",dynasty:"habsbourg_austria",role:"Empereur · Autriche, Bohême, Hongrie (Pays-Bas perdus 1795)",bio:"Dernier empereur du Saint-Empire (1792–1806), premier empereur d'Autriche (1804–1835). Dissout le Saint-Empire face à Napoléon. Père de Marie-Louise, seconde épouse de Napoléon.",entries:["Le Congrès de Vienne"]},
  {id:"franz_karl",name:"François-Charles",dates:"1802–1878",dynasty:"habsbourg_austria",role:"Archiduc d'Autriche",bio:"Archiduc d'Autriche. Renonce à la succession en faveur de son fils François-Joseph lors de la révolution de 1848. Père de François-Joseph et de Maximilien du Mexique.",entries:[]},
  {id:"franz_joseph",name:"François-Joseph Iᵉʳ",dates:"1830–1916",dynasty:"habsbourg_austria",role:"Empereur · Autriche-Hongrie, Bohême, Galicie",bio:"Empereur 1848–1916 (68 ans). Accède au trône à 18 ans lors de la révolution de 1848. Perd l'Italie (Solférino, 1859), concède le compromis austro-hongrois (1867). Frère aîné de Maximilien du Mexique.",entries:["Solférino","Sadowa et la Confédération germanique"]},

  {id:"louis_xiv",name:"Louis XIV",dates:"1638–1715",dynasty:"bourbon",role:"Roi · France, Navarre",bio:"Roi 1643–1715 (72 ans de règne). Cousin et beau-frère de Charles II par Marie-Thérèse. Mène cinq guerres contre les Pays-Bas. Son petit-fils Philippe V fonde les Bourbons d'Espagne.",entries:["Le siège de Namur par Louis XIV","Dumouriez, Valmy","De froid, de faim et de sommeil","Le Traité de Nimègue"]},

  {id:"philippe_v",name:"Philippe V",dates:"1683–1746",dynasty:"bourbon",role:"Roi · Espagne, Naples, Amériques",bio:"Roi d'Espagne 1700–1746. Petit-fils de Louis XIV, héritier de Charles II. Fonde la dynastie Bourbon d'Espagne, qui règne encore aujourd'hui.",entries:["Le siège de Namur par Louis XIV"]},

  {id:"napoleon_iii",name:"Napoléon III",dates:"1808–1873",dynasty:"other_royal",role:"Empereur des Français",bio:"Empereur 1852–1870. Neveu de Napoléon Iᵉʳ, prend le pouvoir par coup d'État (1851). Modernise Paris et l'économie, mais sa politique étrangère — Mexique, guerre franco-prussienne — aboutit à la catastrophe de Sedan et à la chute de l'Empire.",entries:["L'expédition du Mexique et la tragédie de Charlotte","Le scandale de Tannhäuser à Paris","Aspromonte et Mentana — les marches de Garibaldi sur Rome","L'humiliation de Sedan","La proclamation de la République","L'Empire libéral"]},

  {id:"charlotte_belgique",name:"Charlotte de Belgique",dates:"1840–1927",dynasty:"other_royal",role:"Impératrice du Mexique",bio:"Fille de Léopold I<sup>er</sup> des Belges. Épouse l'archiduc Maximilien (1857). Impératrice du Mexique 1864–67. Sombre dans la folie en 1866 après l'échec de ses missions auprès de Napoléon III et du pape. Recluse au château de Bouchout pendant soixante ans.",entries:["L'expédition du Mexique et la tragédie de Charlotte"]},

  {id:"malthus",name:"Thomas R. Malthus",dates:"1766–1834",dynasty:"cultural",role:"Pasteur, économiste",bio:"Auteur de l'<em>Essai sur le principe de population</em> (1798). Soutient que seuls famine, guerre et maladie (ou la continence volontaire) empêchent la population de dépasser les ressources. Inspiration majeure de Darwin.",entries:["Malthus et la « production humaine en série »"]},
  {id:"baudelaire",name:"Charles Baudelaire",dates:"1821–1867",dynasty:"cultural",role:"Poète",bio:"Auteur des <em>Fleurs du mal</em> (1857), condamné pour outrage aux bonnes mœurs. Passe ses dernières années à Bruxelles (1864–66), accumulant des notes pour <em>Pauvre Belgique !</em>. Frappé d'aphasie en 1866, meurt à Paris en 1867.",entries:["Baudelaire et les sansonnets aux yeux crevés","Le scandale de Tannhäuser à Paris"]},
  {id:"julien_apostat",name:"Julien l'Apostat",dates:"331–363",dynasty:"other_royal",role:"Empereur romain",bio:"Empereur 361–363. Neveu de Constantin, tente de restaurer le paganisme. Lettré et ascète, auteur du <em>Misopogon</em>. Meurt en campagne contre les Perses.",entries:["Julien l'Apostat et le retour au paganisme"]},
  {id:"wagner",name:"Richard Wagner",dates:"1813–1883",dynasty:"cultural",role:"Compositeur",bio:"Compositeur allemand. Révolutionne l'opéra avec le concept d'œuvre d'art totale (<em>Gesamtkunstwerk</em>). Le scandale de <em>Tannhäuser</em> à Paris (1861) cristallise les tensions culturelles franco-allemandes.",entries:["Le scandale de Tannhäuser à Paris"]},
  {id:"garibaldi",name:"Giuseppe Garibaldi",dates:"1807–1882",dynasty:"other_royal",role:"Général · Italie",bio:"Héros de l'unification italienne. Conquiert le royaume des Deux-Siciles avec ses Mille (1860). Ses deux marches sur Rome échouent à Aspromonte (1862) et Mentana (1867).",entries:["Aspromonte et Mentana — les marches de Garibaldi sur Rome"]},
  {id:"flourens",name:"Gustave Flourens",dates:"1838–1871",dynasty:"cultural",role:"Biologiste, communard",bio:"Destitué de sa chaire au Collège de France pour athéisme. Aventurier politique, se met au service de l'insurrection crétoise. Nommé général des remparts pendant la Commune, abattu par les Versaillais à Chatou le 3 avril 1871.",entries:["Gustave Flourens et la Commune"]},

  {id:"pie_ix",name:"Pie IX",dates:"1792–1878",dynasty:"religious",role:"Pape",bio:"Pape 1846–1878 — plus long pontificat de l'histoire (31 ans). D'abord perçu comme libéral, se raidit après 1848. Proclame l'Immaculée Conception (1854), publie le <em>Syllabus</em> (1864), convoque Vatican I (1869–70). Perd les États pontificaux (1870).",entries:["Pie IX et le catholicisme belge"]},

  {id:"bocarme",name:"Comte de Bocarmé",dates:"1818–1851",dynasty:"family",role:"Noble belge",bio:"Empoisonne son beau-frère à la nicotine (1850). Son procès à Mons fait sensation. Guillotiné sur la Grand-Place de Mons le 19 juillet 1851.",entries:["L'affaire Bocarmé"]},

  // ─── Family ───
  {id:"remo",name:"Fernand Pirmez (Rémo)",dates:"1844–1872",dynasty:"family",role:"Grand-oncle de Marguerite",bio:"Fils d'Irénée de C. de Marchienne et de Benjamin Pirmez. Irénée est sœur de Flore (mère d'Arthur) et de Zoé (mère de Mathilde) — les grands-parents maternels de Marguerite. Octave lui donne les pseudonymes Rémo, Argyros, Slavoï. Matérialiste, voyageur, pacifiste. Voyage en Algérie, en Grèce, à Paris pendant la Commune où il se lie avec Flourens. Il est assimilé à Julien l'Apostat. Se tue d'une balle le 27 septembre 1872 à Liège — la famille fait passer le suicide pour un accident.",entries:["Julien l'Apostat et le retour au paganisme","L'Année Terrible","Gustave Flourens et la Commune","Les pseudonymes d'Octave et Rémo"]},
  {id:"octave",name:"Octave Pirmez",dates:"1832–1883",dynasty:"family",role:"Grand-oncle de Marguerite",bio:"Fils d'Irénée de C. de Marchienne et de Benjamin Pirmez, frère aîné de Rémo. Idéaliste romantique, écrivain — « le solitaire d'Acoz ». Se voit en jeune Hermès portant Dionysos enfant — son cadet. Rémo lui donne les pseudonymes Cosimo, Zaboï et surtout Héribert. Auteur de <em>Rémo : souvenir d'un frère</em> (1878). Yourcenar lui consacre plus de cent pages.",entries:["Le comte de Horn et le parallèle aristocratique","L'affaire Bocarmé","Les pseudonymes d'Octave et Rémo"]},

  {id:"cesar",name:"Jules César",dates:"100–44 av. J.-C.",dynasty:"other_royal",role:"Consul, dictateur · Rome",bio:"Conquérant de la Gaule (58–50 av. J.-C.). Ses <em>Commentaires</em> sont la première source écrite sur les peuples belges.",entries:["La Citadelle et les tribus celtes"]},
  {id:"trajan",name:"Trajan",dates:"53–117",dynasty:"other_royal",role:"Empereur romain",bio:"Premier empereur originaire des provinces (Italica, Hispanie). Commandant des armées de Germanie Inférieure à Cologne avant son accession.",entries:["Ce légionnaire de race tongre","Publius Aelius Hadrianus"]},
  {id:"nerva",name:"Nerva",dates:"30–98",dynasty:"other_royal",role:"Empereur romain",bio:"Empereur 96–98. Dernier des Flaviens par adoption. Meurt le 27 janvier 98, Trajan lui succède.",entries:["Ce légionnaire de race tongre","Publius Aelius Hadrianus"]},
  {id:"hadrien",name:"Hadrien",dates:"76–138",dynasty:"other_royal",role:"Empereur romain",bio:"Empereur 117–138. Petit-neveu et successeur de Trajan. Sujet des <em>Mémoires d'Hadrien</em> de Yourcenar.",entries:["Publius Aelius Hadrianus"]},

function getConnected(id) {
  const s = new Set([id]);
  ALL_LINKS.forEach(([a,b]) => { if(a===id) s.add(b); if(b===id) s.add(a); });
  return s;
}

// Navigate to timeline entry
function goToEntry(title) {
  switchView('timeline');
  setTimeout(() => {
    const cards = document.querySelectorAll('.event-card');
    for (const card of cards) {
      if (card.querySelector('.event-title')?.textContent?.includes(title.slice(0, 20))) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        highlightCard(card);
        return;
      }
    }
  }, 100);
}

// ─── PERSON POPOVER (in descriptions) ───
let personPopover = null;

function showPersonPopover(pid, anchorEl) {
  closePersonPopover();
  const person = PEOPLE_MAP[pid];
  if (!person) return;
  const c = DYNASTY_COLORS[person.dynasty] || {bg:'#8B7E6A',text:'#3D3225',light:'#F0EDE6'};

  const pop = document.createElement('div');
  pop.className = 'person-popover';
  pop.style.borderLeftColor = c.bg;

  const entries = person.entries.map(e =>
    `<div class="pop-entry" style="border-left-color:${c.bg}40;color:${c.text}" onclick="event.stopPropagation();closePersonPopover();goToEntry('${e.replace(/'/g,"\\'")}')">${e}</div>`
  ).join('');

  pop.innerHTML = `
    <span class="pop-name" style="color:${c.text}">${person.name}</span>
    <span class="pop-dates" style="color:${c.text}">${person.dates}</span>
    ${person.role ? `<div class="pop-role">${person.role}</div>` : ''}
    ${person.bio ? `<div class="pop-bio">${person.bio}</div>` : ''}
    ${entries ? `<div class="pop-label" style="color:${c.bg}">Apparaît dans</div>${entries}` : ''}
  `;

  document.body.appendChild(pop);
  personPopover = pop;

  const rect = anchorEl.getBoundingClientRect();
  const popW = 260, popH = pop.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;

  let left = rect.left + rect.width / 2 - popW / 2;
  left = Math.max(12, Math.min(left, vw - popW - 12));

  let top = rect.bottom + 8;
  if (top + popH > vh - 12) {
    top = rect.top - popH - 8;
  }
  if (top < 12) top = 12;

  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function closePersonPopover() {
  if (personPopover) {
    personPopover.remove();
    personPopover = null;
  }
}

document.addEventListener('click', (e) => {
  const link = e.target.closest('.person-link');
  if (link) {
    e.preventDefault();
    e.stopPropagation();
    const pid = link.getAttribute('data-pid');
    if (personPopover && personPopover.dataset.pid === pid) {
      closePersonPopover();
    } else {
      showPersonPopover(pid, link);
      if (personPopover) personPopover.dataset.pid = pid;
    }
    return;
  }
  if (personPopover && !e.target.closest('.person-popover')) {
    closePersonPopover();
  }
});

function buildChips() {
  const counts = {};
  PEOPLE.forEach(p => { counts[p.dynasty] = (counts[p.dynasty]||0)+1; });
  const el = document.getElementById('perso-chips');
  el.innerHTML = `<button class="perso-chip active" style="border-color:var(--ink);background:var(--ink);color:var(--cream)" onclick="setDynastyFilter('all')">Tous (${PEOPLE.length})</button>` +
    Object.entries(DYNASTY_COLORS).filter(([k])=>counts[k]).map(([k,v]) =>
      `<button class="perso-chip" style="border-color:${v.bg};color:${v.text}" data-dynasty="${k}" onclick="setDynastyFilter('${k}')">${v.label} (${counts[k]})</button>`
    ).join('');
}

function setDynastyFilter(f) {
  dynastyFilter = f === dynastyFilter ? 'all' : f;
  // Update chips
  document.querySelectorAll('.perso-chip').forEach(c => {
    const d = c.dataset.dynasty;
    const isAll = !d;
    const active = isAll ? dynastyFilter === 'all' : dynastyFilter === d;
    const col = isAll ? DYNASTY_COLORS.habsbourg_spain : DYNASTY_COLORS[d]; // dummy for all
    c.classList.toggle('active', active);
    if (isAll) {
      c.style.background = active ? 'var(--ink)' : 'transparent';
      c.style.color = active ? 'var(--cream)' : 'var(--muted)';
    } else {
      c.style.background = active ? DYNASTY_COLORS[d].bg : 'transparent';
      c.style.color = active ? '#fff' : DYNASTY_COLORS[d].text;
    }
  });
  indexSelectedId = null;
  renderIndex();
}

function filterIndex() { indexSelectedId = null; renderIndex(); }

// ─── SVG TREE RENDERING ───
function svgEl(tag, attrs, children) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  if (typeof children === 'string') el.textContent = children;
  else if (Array.isArray(children)) children.forEach(c => c && el.appendChild(c));
  return el;
}

function renderTree() {
  const svg = document.getElementById('tree-svg');
  svg.innerHTML = '';
  const activeId = hoveredId || pinnedId;
  const connected = activeId ? getConnected(activeId) : null;

  // Defs (at SVG root for marker references)
  const defs = svgEl('defs');
  const marker = svgEl('marker', {id:'ad',viewBox:'0 0 6 6',refX:'3',refY:'6',markerWidth:'5',markerHeight:'5',orient:'auto'});
  marker.appendChild(svgEl('path', {d:'M0,0 L3,6 L6,0',fill:'none',stroke:'#B5AD9E','stroke-width':'1'}));
  defs.appendChild(marker);
  svg.appendChild(defs);

  // Main group for pan/zoom
  const mainG = svgEl('g', {id:'tree-group'});

  // Territory background bands with labels above, right-aligned
  const bands = [
    {x:30, y:10, w:155, h:330, c:DYNASTY_COLORS.bourgogne.bg, label:'Bourgogne · Flandre · Brabant'},
    {x:155, y:270, w:350, h:470, c:DYNASTY_COLORS.habsbourg_spain.bg, label:'Espagne · Pays-Bas · Naples · Amériques'},
    {x:460, y:530, w:320, h:640, c:DYNASTY_COLORS.bourbon.bg, label:'France · Navarre'},
    {x:770, y:340, w:380, h:720, c:DYNASTY_COLORS.habsbourg_austria.bg, label:'Autriche · Bohême · Hongrie'},
    {x:770, y:1060, w:480, h:400, c:'#4A6670', label:'Autriche-Hongrie'},
  ];
  bands.forEach(b => {
    mainG.appendChild(svgEl('rect',{x:b.x,y:b.y,width:b.w,height:b.h,rx:'8',fill:b.c,opacity:'0.025'}));
    mainG.appendChild(svgEl('text',{x:b.x + b.w - 4, y:b.y - 7,'text-anchor':'end',fill:b.c,'font-size':'9.5','font-weight':'600','font-family':"'Inter',sans-serif",'letter-spacing':'0.5',opacity:'0.55'},b.label.toUpperCase()));
  });

  // Lines
  D_LINKS.forEach(([f,t]) => {
    const p1=TREE_POS[f], p2=TREE_POS[t]; if(!p1||!p2) return;
    const pf=PEOPLE_MAP[f], pt=PEOPLE_MAP[t];
    const ghostLine = (pf && pf.ghost) || (pt && pt.ghost);
    const x1=p1[0],y1=p1[1]+NH/2,x2=p2[0],y2=p2[1]-NH/2,midY=(y1+y2)/2;
    const dashed = t==='don_juan' || GHOST_DASHES.includes(t);
    mainG.appendChild(svgEl('path',{d:`M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2}`,fill:'none',stroke:'#B5AD9E','stroke-width': ghostLine ? '0.9' : '1.3','stroke-dasharray': dashed ? '5 3' : 'none', opacity: ghostLine ? '0.55' : '1', 'marker-end':'url(#ad)'}));
  });
  M_LINKS.forEach(([f,t]) => {
    const p1=TREE_POS[f], p2=TREE_POS[t]; if(!p1||!p2) return;
    // Handle marriages where nodes are at different y positions
    const leftNode = p1[0] < p2[0] ? p1 : p2;
    const rightNode = p1[0] < p2[0] ? p2 : p1;
    const x1 = leftNode[0]+NW/2+2, x2 = rightNode[0]-NW/2-2;
    const y1 = leftNode[1], y2 = rightNode[1];
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    if (Math.abs(y1-y2) < 10) {
      // Horizontal marriage
      mainG.appendChild(svgEl('line',{x1,y1:y1,x2,y2:y1,stroke:'#C4785A','stroke-width':'2.2'}));
      mainG.appendChild(svgEl('circle',{cx:mx,cy:y1,r:'8',fill:'#FBF5EE',stroke:'#C4785A','stroke-width':'1.5'}));
      mainG.appendChild(svgEl('text',{x:mx,y:y1+4,'text-anchor':'middle',fill:'#C4785A','font-size':'11','font-weight':'700','font-family':"'Inter',sans-serif"},'∞'));
    } else {
      // Angled marriage line
      mainG.appendChild(svgEl('line',{x1,y1,x2,y2,stroke:'#C4785A','stroke-width':'2.2'}));
      mainG.appendChild(svgEl('circle',{cx:mx,cy:my,r:'8',fill:'#FBF5EE',stroke:'#C4785A','stroke-width':'1.5'}));
      mainG.appendChild(svgEl('text',{x:mx,y:my+4,'text-anchor':'middle',fill:'#C4785A','font-size':'11','font-weight':'700','font-family':"'Inter',sans-serif"},'∞'));
    }
  });
  A_LINKS.forEach(([f,t]) => {
    const p1=TREE_POS[f], p2=TREE_POS[t]; if(!p1||!p2) return;
    const y=(p1[1]+p2[1])/2;
    mainG.appendChild(svgEl('line',{x1:p1[0]+NW/2+2,y1:y,x2:p2[0]-NW/2-2,y2:y,stroke:'#B5AD9E','stroke-width':'1','stroke-dasharray':'6 3'}));
  });

  // Annotations
  mainG.appendChild(svgEl('text',{x:530,y:897,'text-anchor':'middle',fill:'#1E3A5F','font-size':'8','font-style':'italic',opacity:'0.5','font-family':"'Inter',sans-serif"},'→ fonde les Bourbons d\'Espagne'));
  mainG.appendChild(svgEl('text',{x:1000,y:1445,'text-anchor':'middle',fill:DYNASTY_COLORS.habsbourg_austria.bg,'font-size':'8','font-style':'italic',opacity:'0.5','font-family':"'Inter',sans-serif"},'→ fusillé au Mexique, 1867'));
  mainG.appendChild(svgEl('text',{x:920,y:505,'text-anchor':'middle',fill:DYNASTY_COLORS.habsbourg_austria.bg,'font-size':'7','font-style':'italic',opacity:'0.35','font-family':"'Inter',sans-serif"},'(branche de Styrie)'));

  // Nodes
  Object.entries(TREE_POS).forEach(([id, pos]) => {
    const p = PEOPLE_MAP[id]; if(!p) return;
    const c = DYNASTY_COLORS[p.dynasty];
    const isGhost = !!p.ghost;
    const isActive = activeId === id;
    const dimmed = connected && !connected.has(id);
    const baseOpacity = isGhost ? 0.6 : 1;
    const g = svgEl('g', {opacity: dimmed ? 0.15 : baseOpacity, style:'transition:opacity 0.25s' + (isGhost ? '' : ';cursor:pointer'), 'data-tnode':'true', 'data-nid':id});
    if (!isGhost) {
      g.addEventListener('mouseenter', () => { hoveredId = id; updateNodeOpacity(); showPopover(); });
      g.addEventListener('mouseleave', () => { hoveredId = null; updateNodeOpacity(); showPopover(); });
      g.addEventListener('click', (e) => { e.stopPropagation(); pinnedId = pinnedId===id ? null : id; updateNodeOpacity(); showPopover(); });
    }
    const x = pos[0]-NW/2, y = pos[1]-NH/2;
    g.appendChild(svgEl('rect', {x,y,width:NW,height:NH,rx:'5',fill:isActive?c.light:(isGhost?'#F8F6F1':'#FDFCF9'),stroke:isActive?c.bg:(isGhost?'#DDD8CF':'#CCC5B8'),'stroke-width':isActive?'2':'1','stroke-dasharray':p.natural?'4 2':(isGhost?'3 2':'none')}));
    const name = p.name.length>22 ? p.name.slice(0,21)+'…' : p.name;
    g.appendChild(svgEl('text',{x:pos[0],y:pos[1]-4,'text-anchor':'middle',fill:isGhost?'#aaaaaa':c.text,'font-size':'11.5','font-weight':isGhost?'400':'600','font-style':isGhost?'italic':'normal','font-family':"'Inter',sans-serif"},name));
    g.appendChild(svgEl('text',{x:pos[0],y:pos[1]+12,'text-anchor':'middle',fill:'#888888','font-size':'9.5','font-family':"'Inter',sans-serif"},p.dates));
    mainG.appendChild(g);
  });

  svg.appendChild(mainG);
  applyTreeTransform();
  showPopover();
}

// ─── PAN / ZOOM ───
function clampPan() {
  const svg = document.getElementById('tree-svg');
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const vw = rect.width, vh = rect.height;
  const tw = SVG_W * treeZoom, th = SVG_H * treeZoom;
  // Keep at least 30% of tree visible in viewport
  const margin = 0.3;
  const minX = vw * margin - tw;
  const maxX = vw * (1 - margin);
  const minY = vh * margin - th;
  const maxY = vh * (1 - margin);
  treePanX = Math.max(minX, Math.min(maxX, treePanX));
  treePanY = Math.max(minY, Math.min(maxY, treePanY));
}

function applyTreeTransform() {
  clampPan();
  const g = document.getElementById('tree-group');
  if (g) g.setAttribute('transform', `translate(${treePanX},${treePanY}) scale(${treeZoom})`);
}

function treeZoomReset() {
  const svg = document.getElementById('tree-svg');
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  treeZoom = Math.min(rect.width / SVG_W, rect.height / SVG_H) * 0.92;
  treePanX = (rect.width - SVG_W * treeZoom) / 2;
  treePanY = 15;
  applyTreeTransform();
  showPopover();
}

function treeZoomAt(factor, cx, cy) {
  const oldZoom = treeZoom;
  treeZoom = Math.max(0.2, Math.min(2.5, treeZoom * factor));
  treePanX = cx - (cx - treePanX) * (treeZoom / oldZoom);
  treePanY = cy - (cy - treePanY) * (treeZoom / oldZoom);
  applyTreeTransform(); showPopover();
}

function treeZoomIn() {
  const svg = document.getElementById('tree-svg');
  const rect = svg.getBoundingClientRect();
  treeZoomAt(1.3, rect.width / 2, rect.height / 2);
}

function treeZoomOut() {
  const svg = document.getElementById('tree-svg');
  const rect = svg.getBoundingClientRect();
  treeZoomAt(1/1.3, rect.width / 2, rect.height / 2);
}

function initTreePanZoom() {
  const svg = document.getElementById('tree-svg');
  const container = document.getElementById('tree-container');

  // Wheel: trackpad pinch (ctrlKey) = zoom, regular scroll = pan, mouse wheel = zoom
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (e.ctrlKey) {
      // Trackpad pinch-to-zoom
      const factor = Math.exp(-e.deltaY * 0.01);
      treeZoomAt(factor, mx, my);
    } else if (Math.abs(e.deltaX) > Math.abs(e.deltaY) || (Math.abs(e.deltaX) > 0 && Math.abs(e.deltaY) > 0)) {
      // Trackpad two-finger pan (has deltaX)
      treePanX -= e.deltaX;
      treePanY -= e.deltaY;
      applyTreeTransform(); showPopover();
    } else {
      // Mouse wheel zoom
      const factor = e.deltaY > 0 ? 0.88 : 1.14;
      treeZoomAt(factor, mx, my);
    }
  }, {passive: false});

  // Drag pan
  let dragging = false, dragX, dragY, panX0, panY0;
  svg.addEventListener('mousedown', (e) => {
    if (e.target.closest('g[data-tnode]')) return;
    dragging = true;
    dragX = e.clientX; dragY = e.clientY;
    panX0 = treePanX; panY0 = treePanY;
    container.classList.add('dragging');
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    treePanX = panX0 + (e.clientX - dragX);
    treePanY = panY0 + (e.clientY - dragY);
    applyTreeTransform(); showPopover();
  });
  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; container.classList.remove('dragging'); }
  });

  // Touch support
  let lastTouchDist = 0, lastTouchMid = null;
  svg.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      dragging = true;
      dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
      panX0 = treePanX; panY0 = treePanY;
    } else if (e.touches.length === 2) {
      dragging = false;
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      lastTouchDist = Math.hypot(dx, dy);
      lastTouchMid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
  }, {passive: false});
  svg.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      treePanX = panX0 + (e.touches[0].clientX - dragX);
      treePanY = panY0 + (e.touches[0].clientY - dragY);
      applyTreeTransform();
    } else if (e.touches.length === 2 && lastTouchDist) {
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      const dist = Math.hypot(dx, dy);
      const rect = svg.getBoundingClientRect();
      const mx = lastTouchMid.x - rect.left;
      const my = lastTouchMid.y - rect.top;
      treeZoomAt(dist / lastTouchDist, mx, my);
      lastTouchDist = dist;
    }
  }, {passive: false});
  svg.addEventListener('touchend', () => { dragging = false; lastTouchDist = 0; });

  // Initial fit
  treeZoomReset();
}

function updateNodeOpacity() {
  const activeId = hoveredId || pinnedId;
  const connected = activeId ? getConnected(activeId) : null;
  const svg = document.getElementById('tree-svg');
  svg.querySelectorAll('g[data-nid]').forEach(g => {
    const nid = g.getAttribute('data-nid');
    const p = PEOPLE_MAP[nid]; if(!p) return;
    const isGhost = !!p.ghost;
    const baseOpacity = isGhost ? 0.6 : 1;
    const dimmed = connected && !connected.has(nid);
    g.setAttribute('opacity', dimmed ? 0.15 : baseOpacity);
    const rect = g.querySelector('rect');
    if(!rect) return;
    const c = DYNASTY_COLORS[p.dynasty];
    const isActive = activeId === nid;
    rect.setAttribute('fill', isActive ? c.light : (isGhost ? '#F8F6F1' : '#FDFCF9'));
    rect.setAttribute('stroke', isActive ? c.bg : (isGhost ? '#DDD8CF' : '#CCC5B8'));
    rect.setAttribute('stroke-width', isActive ? '2' : '1');
  });
}

function showPopover() {
  const container = document.getElementById('tree-container');
  let pop = container.querySelector('.tree-popover');
  const activeId = hoveredId || pinnedId;
  const person = activeId ? PEOPLE_MAP[activeId] : null;

  if (!person) { if (pop) pop.remove(); return; }

  const isPinned = !!pinnedId && !hoveredId && pinnedId === activeId;
  const c = DYNASTY_COLORS[person.dynasty];

  if (!pop) { pop = document.createElement('div'); pop.className = 'tree-popover'; container.appendChild(pop); }
  pop.setAttribute('data-pop', 'true');
  pop.className = 'tree-popover' + (isPinned ? ' pinned' : '');
  pop.style.borderColor = c.bg;

  const entries = person.entries.map(e =>
    `<div class="pop-entry" style="border-left-color:${c.bg}40;color:${c.text}" onclick="event.stopPropagation();goToEntry('${e.replace(/'/g,"\\'")}')">${e}</div>`
  ).join('') || '<div style="font-size:0.82rem;color:#999;font-style:italic">Mentionné dans la généalogie</div>';

  pop.innerHTML = `
    <span class="pop-name" style="color:${c.text}">${person.name}</span>
    <span class="pop-dates" style="color:${c.text}">${person.dates}</span>
    ${person.bio ? `<div class="pop-bio" style="border-bottom:1px solid ${c.bg}20">${person.bio}</div>` : ''}
    <div class="pop-label" style="color:${c.bg}">Apparaît dans</div>
    ${entries}
  `;
}

// ─── INDEX RENDERING ───
function renderIndex() {
  const q = (document.getElementById('perso-search')?.value || '').toLowerCase();
  let list = PEOPLE.filter(p => !p.ghost);
  if (dynastyFilter !== 'all') list = list.filter(p => p.dynasty === dynastyFilter);
  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) || (p.role||'').toLowerCase().includes(q) ||
    p.entries.some(e => e.toLowerCase().includes(q)) || (p.bio||'').toLowerCase().includes(q)
  );
  list.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('perso-count').textContent = list.length + ' personnage' + (list.length !== 1 ? 's' : '');

  const el = document.getElementById('perso-index-list');
  el.innerHTML = list.map(p => {
    const c = DYNASTY_COLORS[p.dynasty];
    const isSel = indexSelectedId === p.id;
    const entries = p.entries.map(e =>
      `<div class="pop-entry" style="border-left-color:${c.bg}40;color:${c.text}" onclick="event.stopPropagation();goToEntry('${e.replace(/'/g,"\\'")}')">${e}</div>`
    ).join('') || '<div style="font-size:0.82rem;color:#999;font-style:italic">Mentionné dans la généalogie</div>';

    return `<div class="index-row" data-irow="true" style="border-left-color:${c.bg};background:${isSel?c.light:'transparent'}" onclick="event.stopPropagation();indexSelectedId=indexSelectedId==='${p.id}'?null:'${p.id}';renderIndex();">
      <div style="flex:1;min-width:0">
        <div><span class="idx-name" style="color:${c.text}">${p.name}</span><span class="idx-dates">${p.dates}</span></div>
        ${p.role ? `<div class="idx-role">${p.role}</div>` : ''}
        ${isSel ? `<div class="index-detail" style="border-top:1px solid ${c.bg}20">
          ${p.bio ? `<div style="margin-bottom:0.6rem;color:var(--ink-light)">${p.bio}</div>` : ''}
          <div class="pop-label" style="color:${c.bg}">Apparaît dans</div>
          ${entries}
        </div>` : ''}
      </div>
      <div class="idx-badge" style="color:${c.bg};background:${c.bg}15">${p.entries.length} entrée${p.entries.length!==1?'s':''}</div>
    </div>`;
  }).join('');
}
</script>
<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Retour en haut">↑ Haut</button>
<script>
window.addEventListener('scroll', () => {
  document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 600);
});
</script>
