<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Fil du Labyrinthe — Références Historiques</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+SC:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --parchment: #ede6d6;
    --ink: #1a1610;
    --ink-light: #3d3428;
    --rust: #8b3a2a;
    --gold: #b8913a;
    --gold-light: #d4b068;
    --muted: #8a7f6e;
    --border: #c8bca8;
    --book1: #5c3d2e;
    --book2: #2e3d5c;
    --book3: #3d5c2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    padding: 4rem 4rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 4rem;
    right: 4rem;
    height: 1px;
    background: var(--gold);
    opacity: 0.4;
  }

  .header-eyebrow {
    font-family: 'Cormorant SC', serif;
    font-size: 1.75rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-family: 'Cormorant Garant', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 1rem;
  }

  h1 em {
    font-style: italic;
    color: var(--ink-light);
  }

  .header-subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.55rem;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .book-legend {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  /* Book dropdown container */
  .book-dropdown {
    position: relative;
  }

  .book-dropdown-trigger {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'Cormorant SC', serif;
    font-size: 1.75rem;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    cursor: pointer;
    transition: opacity 0.2s;
    user-select: none;
  }

  .book-dropdown-trigger:hover { opacity: 0.7; }
  .book-dropdown.inactive .book-dropdown-trigger { opacity: 0.3; }

  .legend-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dropdown-arrow {
    font-size: 0.85rem;
    margin-left: 0.15rem;
    transition: transform 0.2s;
    opacity: 0.5;
  }

  .book-dropdown.open .dropdown-arrow {
    transform: rotate(180deg);
  }

  /* Dropdown menu */
  .book-dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 0.5rem);
    left: 0;
    min-width: 200px;
    background: var(--parchment);
    border: 1px solid var(--border);
    padding: 0.6rem 0.35rem;
    z-index: 100;
    box-shadow: 2px 4px 12px rgba(0,0,0,0.08);
  }

  .book-dropdown.open .book-dropdown-menu {
    display: block;
  }

  /* Chapter items inside dropdown */
  .chapter-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink-light);
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .chapter-item:hover {
    background: rgba(0,0,0,0.04);
  }

  .chapter-check {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--cream);
    transition: all 0.15s;
  }

  .chapter-item.active .chapter-check {
    border-color: var(--ink-light);
    background: var(--ink-light);
  }

  .chapter-item.inactive .chapter-check {
    opacity: 0.4;
  }

  .chapter-count {
    font-family: 'Cormorant SC', serif;
    font-style: normal;
    font-size: 0.85rem;
    color: var(--muted);
    margin-left: auto;
    padding-left: 1rem;
  }

  .download-btn {
    margin-left: auto;
    font-family: 'Cormorant SC', serif;
    font-size: 1.4rem;
    letter-spacing: 0.2em;
    color: var(--rust);
    background: none;
    border: 1px solid var(--rust);
    padding: 0.75rem 1.8rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .download-btn:hover {
    background: var(--rust);
    color: var(--cream);
  }

  /* Active filter pills */
  .timeline-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1.5rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }

  .active-filters {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    flex: 1;
  }

  .filter-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.75rem;
    color: var(--ink-light);
    background: var(--parchment);
    border: 1px solid var(--border);
    padding: 0.4rem 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-pill:hover {
    border-color: var(--rust);
    color: var(--rust);
  }

  .filter-pill .pill-x {
    font-style: normal;
    font-size: 1.3rem;
    opacity: 0.4;
    transition: opacity 0.15s;
  }

  .filter-pill:hover .pill-x {
    opacity: 1;
  }

  .filter-pill .pill-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Search row */
  .search-row {
    margin-bottom: 1.25rem;
    display: flex;
    justify-content: flex-end;
  }

  .sort-toggle {
    display: flex;
    flex-shrink: 0;
  }

  /* Search box */
  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 0.8rem;
    font-size: 1.3rem;
    color: var(--muted);
    pointer-events: none;
  }

  .search-box input {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--ink);
    background: var(--parchment);
    border: 1px solid var(--border);
    padding: 0.4rem 2.2rem 0.4rem 2.4rem;
    width: 200px;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
  }

  .search-box input::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  .search-box input:focus {
    border-color: var(--ink-light);
    width: 260px;
  }

  .search-clear {
    position: absolute;
    right: 0.6rem;
    font-size: 1rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    padding: 0.2rem;
  }

  .search-clear.visible {
    opacity: 0.5;
    pointer-events: auto;
  }

  .search-clear:hover {
    opacity: 1;
  }

  .sort-btn {
    font-family: 'Cormorant SC', serif;
    font-size: 1.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.4rem 1.2rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn:first-child {
    border-right: none;
  }

  .sort-btn.active {
    color: var(--ink-light);
    background: var(--parchment);
    border-color: var(--ink-light);
  }

  .sort-btn:hover:not(.active) {
    color: var(--ink-light);
  }

  /* Density strip */
  .density-strip {
    position: relative;
    margin: 5rem 0 3rem;
    padding: 1.5rem 2rem;
    height: auto;
  }

  .density-line {
    display: none;
  }

  .density-dots {
    position: relative;
    height: 3.5rem;
    margin: 0;
  }

  .density-dots::before {
    content: '';
    position: absolute;
    top: 35%;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--rust);
    opacity: 0.5;
    transform: translateY(-50%);
  }

  .density-dots::after {
    content: '';
    position: absolute;
    top: 35%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--gold-light);
    opacity: 0.2;
    transform: translateY(-50%);
  }

  /* Single dot */
  .density-dot {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    top: 35%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 2;
  }

  .density-dot:hover {
    transform: translate(-50%, -50%) scale(1.8);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    z-index: 10;
  }

  .density-dot.inactive {
    opacity: 0.15;
    pointer-events: none;
  }

  .density-tooltip {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.75rem;
    padding: 0.4rem 0.8rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
  }

  .density-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--ink);
  }

  .density-dot:hover .density-tooltip {
    opacity: 1;
  }

  /* Edge-aligned tooltips */
  .tooltip-right .density-tooltip {
    left: 0;
    transform: translateX(-10%);
  }
  .tooltip-right .density-tooltip::after {
    left: 10%;
  }

  .tooltip-left .density-tooltip {
    left: auto;
    right: 0;
    transform: translateX(10%);
  }
  .tooltip-left .density-tooltip::after {
    left: auto;
    right: 10%;
  }

  /* Edge-aligned popups */
  .popup-right .cluster-popup {
    left: 0;
    transform: translateX(-10%);
  }
  .popup-right .cluster-popup::after {
    left: 10%;
  }

  .popup-left .cluster-popup {
    left: auto;
    right: 0;
    transform: translateX(10%);
  }
  .popup-left .cluster-popup::after {
    left: auto;
    right: 10%;
  }

  /* Cluster bubble */
  .density-cluster {
    position: absolute;
    top: 35%;
    transform: translate(-50%, -50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid var(--cream);
  }

  .density-cluster:hover {
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
    z-index: 10;
  }

  .density-cluster.inactive {
    opacity: 0.15;
    pointer-events: none;
  }

  .cluster-count {
    font-family: 'Cormorant SC', serif;
    font-size: 0.85rem;
    color: var(--cream);
    line-height: 1;
    font-weight: 600;
  }

  /* Cluster popup */
  .cluster-popup {
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    padding: 0.5rem 0;
    min-width: 200px;
    max-width: 320px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .density-cluster:hover .cluster-popup,
  .cluster-popup.open {
    opacity: 1;
    pointer-events: auto;
  }

  .cluster-popup::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--ink);
  }

  .cluster-popup-item {
    display: block;
    width: 100%;
    padding: 0.4rem 1rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--cream);
    background: none;
    border: none;
    text-align: left;
    cursor: pointer;
    transition: background 0.1s;
    line-height: 1.3;
  }

  .cluster-popup-item:hover {
    background: rgba(255,255,255,0.1);
  }

  .cluster-popup-year {
    font-style: normal;
    font-family: 'Cormorant SC', serif;
    font-size: 0.9rem;
    opacity: 0.6;
    margin-right: 0.4rem;
  }

  .density-labels {
    display: none;
  }

  .density-label {
    position: absolute;
    top: calc(35% + 1.2rem);
    font-family: 'Cormorant SC', serif;
    font-size: 1.1rem;
    color: var(--rust);
    letter-spacing: 0.08em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.7;
  }

  .density-label-start {
    left: 0;
  }

  .density-label-end {
    right: 0;
  }

  /* Permanent landmark label */
  .density-landmark {
    position: absolute;
    top: calc(35% + 1.2rem);
    transform: translateX(-50%);
    font-family: 'Cormorant SC', serif;
    font-size: 1.1rem;
    color: var(--rust);
    letter-spacing: 0.08em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.7;
  }

  .density-landmark::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 0.5rem;
    background: var(--rust);
    opacity: 0.4;
  }

  /* Timeline container */
  .timeline-wrapper {
    padding: 3rem 4rem 6rem;
    position: relative;
  }

  /* Central spine */
  .timeline-spine {
    position: absolute;
    left: calc(4rem + 160px);
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--border) 50%, var(--border) 95%, transparent);
  }

  .timeline-spine::after {
    content: '';
    position: absolute;
    left: -0.5px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold-light) 50%, var(--gold-light) 95%, transparent);
    opacity: 0.3;
  }

  /* Year clusters */
  .year-cluster {
    position: relative;
    margin-bottom: 0;
  }

  /* Individual event */
  .event {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 0 3rem;
    position: relative;
    padding: 3.25rem 0;
    max-width: 1050px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .event.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .event.hidden {
    display: none;
  }

  /* Date column */
  .event-date {
    text-align: right;
    padding-top: 0.15rem;
    padding-right: 1.5rem;
    position: relative;
  }

  .event-year {
    font-family: 'Cormorant Garant', serif;
    font-size: 2.9rem;
    font-weight: 300;
    color: var(--ink-light);
    line-height: 1;
  }

  .event-era {
    font-family: 'Cormorant SC', serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: block;
    margin-top: 0.15rem;
  }

  .event-month {
    font-family: 'Cormorant SC', serif;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-top: 0.4rem;
  }

  /* Node on the spine */
  .event-node {
    position: absolute;
    right: -5.5px;
    top: 1.75rem;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--cream);
    z-index: 2;
    transition: transform 0.2s, border-color 0.2s;
  }

  .event:hover .event-node {
    transform: scale(1.5);
  }

  /* Content card */
  .event-card {
    background: var(--parchment);
    border: 1px solid var(--border);
    padding: 2.25rem 2.5rem;
    position: relative;
    transition: box-shadow 0.2s, transform 0.2s;
    max-width: 850px;
  }

  .event-card::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 1.75rem;
    width: 0;
    height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-right: 8px solid var(--border);
  }

  .event-card::after {
    content: '';
    position: absolute;
    left: -6px;
    top: 1.8rem;
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 7px solid var(--parchment);
    z-index: 1;
  }

  .event:hover .event-card {
    box-shadow: 4px 4px 16px rgba(0,0,0,0.08);
    transform: translateX(4px);
  }

  /* Book tag */
  .book-tag {
    position: absolute;
    top: -1px;
    right: -1px;
    font-family: 'Cormorant SC', serif;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 0.85rem;
    color: var(--cream);
    text-transform: uppercase;
  }

  .event-title {
    font-family: 'Cormorant Garant', serif;
    font-size: 2.15rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.85rem;
    padding-right: 8rem;
    line-height: 1.3;
  }

  .event-description {
    font-size: 1.75rem;
    line-height: 1.85;
    color: var(--ink-light);
    font-style: italic;
  }

  .event-description strong {
    font-style: normal;
    font-weight: 500;
    color: var(--ink);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-style: italic;
    font-size: 1.8rem;
  }

  /* Count */
  .event-count {
    font-family: 'Cormorant SC', serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  /* Divider between different years */
  .year-divider {
    grid-column: 1 / -1;
    height: 1px;
    background: var(--border);
    opacity: 0.4;
    margin: 0;
  }

  @media (max-width: 700px) {
    /* Header */
    header { padding: 1.5rem 1.25rem 1.25rem; }
    header::after { left: 1.25rem; right: 1.25rem; }
    .header-eyebrow { font-size: 0.75rem; letter-spacing: 0.2em; margin-bottom: 0.85rem; }
    h1 { font-size: 1.6rem; line-height: 1.3; margin-bottom: 0.6rem; }
    .header-subtitle { font-size: 0.85rem; margin-top: 0.4rem; }

    /* Legend & meta */
    .header-meta { gap: 1rem; margin-top: 1.25rem; }
    .book-legend { gap: 0.75rem; }
    .book-dropdown-trigger { font-size: 0.8rem; gap: 0.4rem; }
    .legend-dot { width: 8px; height: 8px; }
    .dropdown-arrow { font-size: 0.6rem; }
    .book-dropdown-menu { min-width: 170px; padding: 0.4rem 0.25rem; }
    .chapter-item { font-size: 0.8rem; padding: 0.35rem 0.55rem; gap: 0.45rem; }
    .chapter-check { width: 11px; height: 11px; font-size: 0.55rem; }
    .chapter-count { font-size: 0.65rem; }
    .download-btn { margin-left: 0; margin-top: 0.5rem; font-size: 0.75rem; padding: 0.4rem 1rem; }

    /* Chapter chips (legacy cleanup) */
    .chapter-filter { display: none; }

    /* Active filter pills & toolbar */
    .timeline-toolbar { gap: 0.75rem; padding-bottom: 3.5rem; margin-bottom: 2rem; }
    .search-row { margin-bottom: 0.75rem; }
    .search-box { width: 100%; }

    .density-dot { width: 7px; height: 7px; }
    .density-tooltip { font-size: 0.75rem; padding: 0.3rem 0.6rem; }

    .density-landmark::before { height: 0.35rem; }
    .density-cluster { width: 22px; height: 22px; border-width: 1.5px; }
    .cluster-count { font-size: 0.7rem; }
    .cluster-popup { min-width: 160px; max-width: 240px; }
    .cluster-popup-item { font-size: 0.75rem; padding: 0.35rem 0.75rem; }
    .cluster-popup-year { font-size: 0.65rem; }

    /* Timeline wrapper */
    .timeline-wrapper { padding: 3rem 1.25rem 3rem; }

    /* Spine */
    .timeline-spine { left: calc(1.25rem + 65px); }

    /* Events */
    .event {
      grid-template-columns: 65px 1fr;
      gap: 0 1rem;
      padding: 1.5rem 0;
      max-width: none;
    }

    /* Date column */

    .event-year { font-size: 1.3rem; }
    .event-era { font-size: 0.55rem; margin-top: 0.1rem; }
    .event-month { font-size: 0.6rem; margin-top: 0.2rem; letter-spacing: 0.1em; }

// ─── BOOK COLOURS ────────────────────────────────────────────────────────────
const bookColors = {
  1: 'var(--book1)',
  2: 'var(--book2)',
  3: 'var(--book3)'
};

const bookNames = {
  1: 'I',
  2: 'II',
  3: 'III'
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeChapters = new Set(events.map(e => e.chapter));
let openDropdown = null;
let sortMode = 'chrono'; // 'chrono' or 'text'

const fullBookNames = {
  1: 'I. Souvenirs Pieux',
  2: 'II. Archives du Nord',
  3: "III. Quoi? L'Éternité"
};

// ─── BUILD LEGEND WITH DROPDOWNS ────────────────────────────────────────────
function buildLegend() {
  const legend = document.getElementById('legend');
  const chaptersPerBook = {};
  const sorted = [...events].sort((a, b) => a.year - b.year);

  // Gather chapters per book in chronological order
  for (const e of sorted) {
    if (!chaptersPerBook[e.book]) chaptersPerBook[e.book] = [];
    if (!chaptersPerBook[e.book].find(c => c.name === e.chapter)) {
      const count = events.filter(ev => ev.book === e.book && ev.chapter === e.chapter).length;
      chaptersPerBook[e.book].push({ name: e.chapter, count });
    }
  }

  legend.innerHTML = [1, 2, 3].map(book => {
    const chapters = chaptersPerBook[book] || [];
    const hasChapters = chapters.length > 0;
    return `
      <div class="book-dropdown${hasChapters ? '' : ' inactive'}" data-book="${book}" id="book-dropdown-${book}">
        <div class="book-dropdown-trigger" onclick="${hasChapters ? `toggleDropdown(${book})` : ''}">
          <div class="legend-dot" style="background:${bookColors[book]}"></div>
          ${fullBookNames[book]}
          ${hasChapters ? '<span class="dropdown-arrow">▾</span>' : ''}
        </div>
        ${hasChapters ? `<div class="book-dropdown-menu">${
          chapters.map(c =>
            `<button class="chapter-item ${activeChapters.has(c.name) ? 'active' : 'inactive'}"
              data-chapter="${c.name}" data-book="${book}"
              onclick="event.stopPropagation(); toggleChapter('${c.name.replace(/'/g, "\\'")}')">
              <span class="chapter-check">✓</span>
              « ${c.name} »
              <span class="chapter-count">${c.count}</span>
            </button>`
          ).join('')
        }</div>` : ''}
      </div>
    `;
  }).join('');
}

function toggleDropdown(book) {
  if (openDropdown === book) {
    closeDropdowns();
  } else {
    closeDropdowns();
    openDropdown = book;
    document.getElementById(`book-dropdown-${book}`).classList.add('open');
  }
}

function closeDropdowns() {
  openDropdown = null;
  document.querySelectorAll('.book-dropdown').forEach(el => el.classList.remove('open'));
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.book-dropdown')) closeDropdowns();
  if (!e.target.closest('.density-cluster')) closeClusterPopup();
});

function toggleChapter(name) {
  if (activeChapters.has(name) && activeChapters.size === 1) return;
  if (activeChapters.has(name)) {
    activeChapters.delete(name);
  } else {
    activeChapters.add(name);
  }
  updateChapterItems();
  updateBookStates();
  render();
}

function updateChapterItems() {
  document.querySelectorAll('.chapter-item').forEach(el => {
    const ch = el.dataset.chapter;
    el.classList.toggle('active', activeChapters.has(ch));
    el.classList.toggle('inactive', !activeChapters.has(ch));
  });
}

function updateBookStates() {
  [1, 2, 3].forEach(book => {
    const bookChapters = events.filter(e => e.book === book).map(e => e.chapter);
    const anyActive = bookChapters.some(ch => activeChapters.has(ch));
    const dropdown = document.getElementById(`book-dropdown-${book}`);
    if (dropdown && bookChapters.length > 0) {
      dropdown.classList.toggle('inactive', !anyActive);
    }
  });
}

// ─── SORT ────────────────────────────────────────────────────────────────────
function setSortMode(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.sort === mode);
  });
  render();
}

// ─── DENSITY STRIP ──────────────────────────────────────────────────────────
let openCluster = null;

// Piecewise scale: compresses deep time, expands recent centuries
function yearToPosition(year) {
  const segments = [
    { fromYear: -100000, toYear: 0, fromPct: 0, toPct: 20 },
    { fromYear: 0, toYear: 1500, fromPct: 20, toPct: 40 },
    { fromYear: 1500, toYear: 1900, fromPct: 40, toPct: 70 },
    { fromYear: 1900, toYear: 2026, fromPct: 70, toPct: 100 }
  ];
  if (year <= segments[0].fromYear) return 0;
  if (year >= segments[segments.length - 1].toYear) return 100;
  for (const seg of segments) {
    if (year >= seg.fromYear && year <= seg.toYear) {
      const ratio = (year - seg.fromYear) / (seg.toYear - seg.fromYear);
      return seg.fromPct + ratio * (seg.toPct - seg.fromPct);
    }
  }
  return 50;
}

function renderDensityStrip() {
  const container = document.getElementById('density-dots');

  // Calculate positions using piecewise scale
  const positioned = events.map((e, i) => ({
    event: e,
    index: i,
    pct: yearToPosition(e.year),
    active: activeChapters.has(e.chapter)
  }));

  // Group events within 2% of each other
  const clusterThreshold = 2;
  const clusters = [];
  const used = new Set();
  const byPos = [...positioned].sort((a, b) => a.pct - b.pct);

  for (let i = 0; i < byPos.length; i++) {
    if (used.has(byPos[i].index)) continue;
    const cluster = [byPos[i]];
    used.add(byPos[i].index);
    for (let j = i + 1; j < byPos.length; j++) {
      if (used.has(byPos[j].index)) continue;
      if (Math.abs(byPos[j].pct - byPos[i].pct) <= clusterThreshold) {
        cluster.push(byPos[j]);
        used.add(byPos[j].index);
      }
    }
    clusters.push(cluster);
  }

  // Determine tooltip edge class based on position
  function tooltipEdge(pct) {
    if (pct < 12) return 'tooltip-right';
    if (pct > 88) return 'tooltip-left';
    return '';
  }

  function popupEdge(pct) {
    if (pct < 15) return 'popup-right';
    if (pct > 85) return 'popup-left';
    return '';
  }

  // Render
  container.innerHTML = clusters.map((cluster, ci) => {
    const avgPct = cluster.reduce((s, c) => s + c.pct, 0) / cluster.length;
    const anyActive = cluster.some(c => c.active);

    if (cluster.length === 1) {
      const c = cluster[0];
      const displayYear = c.event.year < 0 ? `${Math.abs(c.event.year)} av. J.-C.` : c.event.year;
      return `<div class="density-dot ${c.active ? '' : 'inactive'} ${tooltipEdge(c.pct)}"
        style="left:${c.pct}%; background:${bookColors[c.event.book]}"
        onclick="scrollToEvent(${c.index})">
        <div class="density-tooltip">${displayYear} — ${c.event.title}</div>
      </div>`;
    } else {
      const bookCounts = {};
      cluster.forEach(c => { bookCounts[c.event.book] = (bookCounts[c.event.book] || 0) + 1; });
      const dominantBook = Object.entries(bookCounts).sort((a, b) => b[1] - a[1])[0][0];
      const color = bookColors[dominantBook];

      const items = cluster.map(c => {
        const yr = c.event.year < 0 ? `${Math.abs(c.event.year)} av. J.-C.` : c.event.year;
        return `<button class="cluster-popup-item" onclick="event.stopPropagation(); closeClusterPopup(); scrollToEvent(${c.index})">
          <span class="cluster-popup-year">${yr}</span>${c.event.title}
        </button>`;
      }).join('');

      return `<div class="density-cluster ${anyActive ? '' : 'inactive'} ${popupEdge(avgPct)}"
        style="left:${avgPct}%; background:${color}"
        onclick="event.stopPropagation(); toggleClusterPopup(${ci})">
        <span class="cluster-count">${cluster.length}</span>
        <div class="cluster-popup" id="cluster-popup-${ci}">
          ${items}
        </div>
      </div>`;
    }
  }).join('');

  // Fixed axis labels — rendered inside dots container
  container.innerHTML += `<div class="density-label density-label-start">Pléistocène</div>`;
  container.innerHTML += `<div class="density-label density-label-end">2026</div>`;

  // Landmark for Marguerite's birth
  const birthPct = yearToPosition(1903);
  container.innerHTML += `<div class="density-landmark" style="left:${birthPct}%">1903 — Naissance de M. de Crayencour</div>`;
}

function toggleClusterPopup(ci) {
  const popup = document.getElementById(`cluster-popup-${ci}`);
  if (openCluster === ci) {
    popup.classList.remove('open');
    openCluster = null;
  } else {
    closeClusterPopup();
    popup.classList.add('open');
    openCluster = ci;
  }
}

function closeClusterPopup() {
  if (openCluster !== null) {
    const popup = document.getElementById(`cluster-popup-${openCluster}`);
    if (popup) popup.classList.remove('open');
    openCluster = null;
  }
}

function scrollToEvent(dataIndex) {
  const e = events[dataIndex];
  closeClusterPopup();
  const cards = document.querySelectorAll('.event');
  for (const card of cards) {
    if (card.querySelector('.event-title')?.textContent === e.title) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.querySelector('.event-card').style.boxShadow = `0 0 0 2px ${bookColors[e.book]}`;
      setTimeout(() => {
        card.querySelector('.event-card').style.boxShadow = '';
      }, 1500);
      break;
    }
  }
}

// ─── ACTIVE FILTERS DISPLAY ─────────────────────────────────────────────────
function updateActiveFilters() {
  const container = document.getElementById('active-filters');

  container.innerHTML = [...activeChapters].map(ch => {
    const book = events.find(e => e.chapter === ch)?.book;
    const color = book ? bookColors[book] : 'var(--muted)';
    return `<button class="filter-pill" onclick="toggleChapter('${ch.replace(/'/g, "\\'")}')">
      <span class="pill-dot" style="background:${color}"></span>
      « ${ch} »
      <span class="pill-x">✕</span>
    </button>`;
  }).join('');
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
// ─── SEARCH ─────────────────────────────────────────────────────────────────
let searchQuery = '';

function handleSearch(value) {
  searchQuery = value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', searchQuery.length > 0);
  render();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  render();
}

function matchesSearch(e) {
  if (!searchQuery) return true;
  const haystack = `${e.title} ${e.description} ${e.year} ${e.month || ''}`.toLowerCase();
  // Match all words (AND logic)
  return searchQuery.split(/\s+/).every(word => haystack.includes(word));
}

function render() {
  const container = document.getElementById('timeline');
  const sorted = sortMode === 'chrono'
    ? [...events].sort((a, b) => a.year - b.year || a.textOrder - b.textOrder)
    : [...events].sort((a, b) => a.book - b.book || a.textOrder - b.textOrder);
  const filtered = sorted.filter(e => activeChapters.has(e.chapter) && matchesSearch(e));

  if (filtered.length === 0) {
    container.innerHTML = '<p class="empty-state">Aucun événement pour la sélection en cours.</p>';
    document.getElementById('event-count').textContent = '';
    return;
  }

  container.innerHTML = filtered.map((e, i) => {
    const delay = (i % 8) * 80;
    const displayYear = e.year < 0
      ? `${Math.abs(e.year)} <span class="event-era">av. J.-C.</span>`
      : e.year;
    return `
      <div class="event" style="transition-delay:${delay}ms" data-book="${e.book}">
        <div class="event-date">
          <span class="event-year">${displayYear}</span>
          ${e.month ? `<span class="event-month">${e.month}</span>` : ''}
          <div class="event-node" style="border-color:${bookColors[e.book]}; background:var(--cream)"></div>
        </div>
        <div class="event-card">
          <div class="book-tag" style="background:${bookColors[e.book]}">Livre ${bookNames[e.book]}</div>
          <div class="event-title">${e.title}</div>
          <div class="event-description">${e.description}</div>
        </div>
      </div>
    `;
  }).join('');

  // Animate in
  requestAnimationFrame(() => {
    document.querySelectorAll('.event').forEach(el => {
      setTimeout(() => el.classList.add('visible'), parseInt(el.style.transitionDelay) || 0);
    });
  });

  const total = events.length;
  const shown = filtered.length;
  const label = shown === total
    ? `${total} référence${total > 1 ? 's' : ''} — trilogie complète`
    : `${shown} référence${shown > 1 ? 's' : ''} affichée${shown > 1 ? 's' : ''} sur ${total}`;
  document.getElementById('event-count').textContent = label;
  updateActiveFilters();
  renderDensityStrip();
}

// ─── DOWNLOAD ────────────────────────────────────────────────────────────────
function downloadPage() {
  // Close any open dropdown before capturing HTML
  closeDropdowns();
  const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'le_fil_du_labyrinthe.html';
  a.click();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildLegend();
render();
</script>
